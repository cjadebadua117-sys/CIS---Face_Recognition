{% extends 'base.html' %}
{% block title %}Delete Account{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="mb-4">
        <h1>Delete Account</h1>
        <p class="text-muted">Are you sure you want to permanently delete {{ account.get_full_name|default:account.username }}?</p>
    </div>

    <div class="card p-4 shadow-sm">
        <form method="post">
            {% csrf_token %}
            <p class="mb-4">This action cannot be undone.</p>
            <button type="submit" class="btn btn-danger">Delete Account</button>
            <a href="{% url 'admin_dashboard' %}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
